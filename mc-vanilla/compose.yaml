services:
  mc:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    ports:
      - "25565:25565"
      # BlueMap Web UI
      - "8100:8100"

    environment:
      EULA: "TRUE"

      TYPE: "PAPER"
      VERSION: "26.2"
      PAPER_CHANNEL: "experimental"

      MODRINTH_PROJECTS: |
        bluemap?
        discordsrv?

      # サーバのメモリが8GB
      MEMORY: "7G"

      TZ: "Asia/Tokyo"
      MOTD: "Paper Minecraft 26.2 Server"
      DIFFICULTY: "normal"
      MODE: "survival"

    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro

    tty: true
    stdin_open: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"

# DiscordSRV Config
# 
# BotToken: "DiscordのBotトークン"
# Channels: {"global": "DiscordのチャンネルID"}
# data/plugins/DiscordSRV/config.yml
